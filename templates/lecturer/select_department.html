<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Select Department | TTTTI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-900 via-blue-800 to-blue-900 min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-md">
  <div class="bg-white rounded-xl shadow-2xl p-8">
    <div class="text-center mb-8">
      <img src="{{ LOGO_URL }}" alt="Logo" class="h-20 mx-auto mb-4">
      <h1 class="text-2xl font-bold text-blue-900 mb-2">Select Department</h1>
      <p class="text-gray-600">Choose your department to continue</p>
    </div>

    <form method="post" class="space-y-6">
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-3">Department</label>
        <select name="department_id" class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg text-gray-900 font-medium focus:border-blue-900 focus:ring-2 focus:ring-blue-200 transition" required>
          <option value="">-- Choose Department --</option>
          {% for d in depts %}<option value="{{ d.id }}">{{ d.name }}</option>{% endfor %}
        </select>
      </div>

      <button type="submit" class="w-full bg-blue-900 hover:bg-blue-950 text-white font-bold py-3 rounded-lg transition transform hover:scale-105">
        <i class="fas fa-arrow-right"></i> Proceed to Dashboard
      </button>
    </form>

    <div class="text-center mt-6 border-t pt-6">
      <a href="/lecturer/logout" class="text-blue-900 hover:text-blue-950 font-bold text-sm transition">
        <i class="fas fa-sign-out-alt"></i> Logout
      </a>
    </div>
  </div>
</div>

</body>
</html>
